services:
  mongodb:
    image: mongo:latest
    container_name: todo-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: todo-redis
    restart: always
    ports:
      - "6379:6379"


volumes:
  mongodb_data:
    driver: local
